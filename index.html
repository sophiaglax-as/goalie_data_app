<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>ゴーリーデータ管理</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#111826;
      --muted:#8aa0b6;
      --text:#eaf1fb;

      --ok:#22c55e;   /* 成功 */
      --sv:#38bdf8;   /* セーブ */
      --accent:#f59e0b;

      --border:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(245,158,11,.12), transparent 60%),
                  radial-gradient(1000px 600px at 90% 0%, rgba(56,189,248,.10), transparent 55%),
                  var(--bg);
      color:var(--text);
      -webkit-tap-highlight-color:transparent;
    }
    .wrap{max-width:560px;margin:0 auto;padding:14px 14px 110px;}
    header{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:6px 0 12px;}
    .title{font-size:18px;font-weight:800;letter-spacing:.02em;}
    .pill{display:flex;gap:8px;align-items:center;padding:8px 10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--muted);}
    .dot{width:8px;height:8px;border-radius:999px;background:var(--ok);opacity:.9}

    .card{background:rgba(17,24,38,.86);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin:10px 0;backdrop-filter:blur(10px);}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;}
    input,select{width:100%;padding:12px 12px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);outline:none;font-size:15px;}

    .btn{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);padding:12px 12px;border-radius:16px;font-size:16px;font-weight:800;width:100%;cursor:pointer;user-select:none;touch-action:manipulation;}
    .btn:active{transform:translateY(1px);}
    .btnSmall{padding:10px 12px;border-radius:14px;font-size:14px;font-weight:800;background:rgba(255,255,255,.05);}

    .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .seg2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    .seg6{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

    .choice{border:1px solid var(--border);background:rgba(255,255,255,.05);border-radius:18px;padding:14px 10px;text-align:center;font-weight:900;font-size:18px;cursor:pointer;user-select:none;touch-action:manipulation;}
    .choiceSub{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px;}
    .choice.active{outline:2px solid rgba(245,158,11,.75);background:rgba(245,158,11,.13);}
    .resSuccess.active{outline-color:rgba(34,197,94,.75);background:rgba(34,197,94,.15);}
    .resSave.active{outline-color:rgba(56,189,248,.75);background:rgba(56,189,248,.15);}

    .stepTitle{display:flex;justify-content:space-between;align-items:end;margin-bottom:10px;}
    .stepTitle h2{margin:0;font-size:16px;letter-spacing:.01em;}
    .stepTitle span{font-size:12px;color:var(--muted);}

    .courseGrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .courseBtn{border:1px solid var(--border);background:rgba(255,255,255,.05);border-radius:18px;height:62px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:1000;cursor:pointer;user-select:none;touch-action:manipulation;}
    .courseBtn:active{transform:translateY(1px);}

    .bottomBar{position:fixed;left:0;right:0;bottom:0;padding:10px 12px 14px;background:linear-gradient(to top, rgba(11,15,20,.98), rgba(11,15,20,.65));border-top:1px solid rgba(255,255,255,.10);backdrop-filter:blur(10px);}
    .bottomInner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:1.2fr .8fr;gap:10px;}
    .primary{background:rgba(245,158,11,.16);border-color:rgba(245,158,11,.45);font-size:17px;}
    .danger{background:rgba(255,255,255,.04);}

    .mini{font-size:12px;color:var(--muted);line-height:1.4;margin-top:8px;}
    .divider{height:1px;background:rgba(255,255,255,.10);margin:12px 0;}

    .shotsList .item{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);border-radius:16px;padding:10px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0;}
    .tag{font-size:12px;font-weight:900;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.06);}
    .tag.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.12);}
    .tag.sv{border-color:rgba(56,189,248,.35);background:rgba(56,189,248,.12);}
    .muted{color:var(--muted)}
    .tiny{font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">ゴーリーデータ管理</div>
      <div class="pill"><div class="dot" id="dot"></div><span id="status">接続中…</span></div>
    </header>

    <div class="card">
      <div class="row">
        <div style="flex:1 1 160px">
          <label>スタッフ名（任意）</label>
          <input id="staff" placeholder="例：彩葉" />
        </div>
        <div style="flex:1 1 160px">
          <label>連打モード</label>
          <button class="btn btnSmall" id="rapidBtn" onclick="toggleRapid()">OFF</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="row">
        <div style="flex:1 1 240px">
          <label>担当ゴーリー</label>
          <select id="goalieSelect"></select>
        </div>
        <div style="flex:1 1 120px">
          <label>管理</label>
          <button class="btn btnSmall" onclick="openPlayers()">選手登録</button>
        </div>
      </div>

      <div class="mini">
        4ステップ：<b>立ち位置 → エリア → 結果 → コース</b><br/>
        連打モードON：<b>コースを押すだけで即送信</b>（前3項目を保持）
      </div>
    </div>

    <div class="card" id="step1">
      <div class="stepTitle">
        <h2>① ゴーリーの立ち位置</h2><span id="s1hint" class="muted">選択してください</span>
      </div>
      <div class="seg">
        <div class="choice" id="standL" onclick="pickStand('L')">左<div class="choiceSub">L</div></div>
        <div class="choice" id="standC" onclick="pickStand('C')">中央<div class="choiceSub">C</div></div>
        <div class="choice" id="standR" onclick="pickStand('R')">右<div class="choiceSub">R</div></div>
      </div>
    </div>

    <div class="card" id="step2">
      <div class="stepTitle">
        <h2>② シューターエリア（扇6分割）</h2><span id="s2hint" class="muted">選択してください</span>
      </div>
      <div class="seg6">
        <div class="choice" id="area1" onclick="pickArea(1)">1</div>
        <div class="choice" id="area2" onclick="pickArea(2)">2</div>
        <div class="choice" id="area3" onclick="pickArea(3)">3</div>
        <div class="choice" id="area4" onclick="pickArea(4)">4</div>
        <div class="choice" id="area5" onclick="pickArea(5)">5</div>
        <div class="choice" id="area6" onclick="pickArea(6)">6</div>
      </div>
    </div>

    <div class="card" id="step3">
      <div class="stepTitle">
        <h2>③ 結果</h2><span id="s3hint" class="muted">選択してください</span>
      </div>
      <div class="seg2">
        <div class="choice resSuccess" id="resSUCCESS" onclick="pickResult('SUCCESS')">
          成功<div class="choiceSub" style="color:rgba(34,197,94,.9)">SUCCESS</div>
        </div>
        <div class="choice resSave" id="resSAVE" onclick="pickResult('SAVE')">
          セーブ<div class="choiceSub" style="color:rgba(56,189,248,.9)">SAVE</div>
        </div>
      </div>
    </div>

    <div class="card" id="step4">
      <div class="stepTitle">
        <h2>④ コース（1〜9）</h2><span id="s4hint" class="muted">選択してください</span>
      </div>

      <div class="tiny muted" style="margin-bottom:8px;">3×3（1〜9）</div>
      <div class="courseGrid3" id="courseGrid"></div>
      <div class="mini" id="courseHint"></div>
    </div>

    <div class="card">
      <div class="stepTitle">
        <h2>最近の入力（取り消し可）</h2>
        <span class="muted">最新20件</span>
      </div>
      <div class="shotsList" id="shotsList"></div>
    </div>

    <div class="card" id="playersCard" style="display:none;">
      <div class="stepTitle">
        <h2>選手登録</h2>
        <span class="muted">表示/非表示/削除</span>
      </div>
      <div class="row">
        <div style="flex:1">
          <label>追加する名前</label>
          <input id="newPlayerName" placeholder="例：山田 花子" />
        </div>
        <div style="flex:0 0 120px">
          <label>&nbsp;</label>
          <button class="btn" onclick="addPlayer()">追加</button>
        </div>
      </div>
      <div class="divider"></div>
      <div id="playersList"></div>
      <div style="margin-top:10px;">
        <button class="btn btnSmall" onclick="closePlayers()">閉じる</button>
      </div>
    </div>
  </div>

  <div class="bottomBar">
    <div class="bottomInner">
      <button class="btn primary" onclick="submitIfReady(false)">送信（またはコース選択）</button>
      <button class="btn danger" onclick="resetAll()">リセット</button>
    </div>
  </div>

<script>
  const API_URL = https://script.google.com/macros/s/AKfycbwIo2DV2_GD7jrJgpthp7QuE1f3N_eX-L1NZ-bqcxKJXscwUGOlx-Jmjfdbn1CU80QvYA/exec;

  const state = {
    staff: '',
    rapidMode: false,
    goalieId: '',
    goalieName: '',
    goalieStand: '',
    shooterArea: null,
    result: '',
    course: null
  };

  function qs(id){ return document.getElementById(id); }

  function setStatus(ok, text){
    qs('status').textContent = text;
    qs('dot').style.background = ok ? 'var(--ok)' : 'var(--sv)';
    qs('dot').style.opacity = ok ? '.9' : '.95';
  }

  async function api(payload){
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(!json.ok) throw new Error(json.error || 'API error');
    return json;
  }

  function toggleRapid(){
    state.rapidMode = !state.rapidMode;
    qs('rapidBtn').textContent = state.rapidMode ? 'ON' : 'OFF';
    qs('rapidBtn').style.background = state.rapidMode ? 'rgba(245,158,11,.18)' : 'rgba(255,255,255,.05)';
    qs('rapidBtn').style.borderColor = state.rapidMode ? 'rgba(245,158,11,.45)' : 'rgba(255,255,255,.10)';
    renderHint();
  }

  function pickStand(v){
    state.goalieStand = v;
    ['L','C','R'].forEach(x => qs('stand'+x).classList.toggle('active', x===v));
    qs('s1hint').textContent = '選択済み';
    renderHint();
  }

  function pickArea(n){
    state.shooterArea = n;
    for(let i=1;i<=6;i++){
      qs('area'+i).classList.toggle('active', i===n);
    }
    qs('s2hint').textContent = '選択済み';
    renderHint();
  }

  function pickResult(r){
    state.result = r;
    ['SUCCESS','SAVE'].forEach(x => qs('res'+x).classList.toggle('active', x===r));
    qs('s3hint').textContent = '選択済み';
    state.course = null;
    qs('s4hint').textContent = '選択してください';
    renderHint();
  }

  function renderHint(){
    const parts = [];
    if(!state.goalieId) parts.push('ゴーリー');
    if(!state.goalieStand) parts.push('立ち位置');
    if(!state.shooterArea) parts.push('エリア');
    if(!state.result) parts.push('結果');

    if(parts.length){
      qs('courseHint').innerHTML = `先に <b>${parts.join('・')}</b> を選択してください。`;
    }else{
      qs('courseHint').innerHTML = state.rapidMode
        ? `連打モードON：<b>コースを押すだけで即送信</b>（前3項目は保持）`
        : `コースを選択してから、下の「送信」でもOKです。`;
    }
  }

  function buildCourseButtons(){
    const holder = qs('courseGrid');
    holder.innerHTML = '';
    for(let i=1;i<=9;i++){
      const b = document.createElement('div');
      b.className = 'courseBtn';
      b.textContent = i;
      b.onclick = () => pickCourse(i);
      holder.appendChild(b);
    }
  }

  async function pickCourse(n){
    state.course = n;
    if(state.rapidMode){
      await submitIfReady(true);
    }
  }

  function resetAll(){
    state.goalieStand = '';
    state.shooterArea = null;
    state.result = '';
    state.course = null;

    ['L','C','R'].forEach(x => qs('stand'+x).classList.remove('active'));
    for(let i=1;i<=6;i++) qs('area'+i).classList.remove('active');
    ['SUCCESS','SAVE'].forEach(x => qs('res'+x).classList.remove('active'));

    qs('s1hint').textContent = '選択してください';
    qs('s2hint').textContent = '選択してください';
    qs('s3hint').textContent = '選択してください';
    qs('s4hint').textContent = '選択してください';

    renderHint();
  }

  function keepForRapid(){ state.course = null; }

  function getSelectedGoalie(){
    const sel = qs('goalieSelect');
    const v = sel.value || '';
    const name = sel.options[sel.selectedIndex]?.textContent || '';
    return { goalieId: v, goalieName: name };
  }

  async function submitIfReady(fromCourseTap){
    state.staff = qs('staff').value.trim();
    const g = getSelectedGoalie();
    state.goalieId = g.goalieId;
    state.goalieName = g.goalieName;

    if(!state.goalieId){ alert('担当ゴーリーを選んでください'); return; }
    if(!state.goalieStand){ alert('立ち位置を選んでください'); return; }
    if(!state.shooterArea){ alert('シューターエリアを選んでください'); return; }
    if(!state.result){ alert('結果を選んでください'); return; }
    if(!state.course){
      qs('s4hint').textContent = 'コースを選択してください';
      return;
    }

    try{
      await api({
        action: 'addShot',
        staff: state.staff,
        goalieId: state.goalieId,
        goalieName: state.goalieName,
        goalieStand: state.goalieStand,
        shooterArea: state.shooterArea,
        result: state.result,
        course: state.course,
        rapidMode: state.rapidMode
      });

      if(state.rapidMode) keepForRapid();
      else state.course = null;

      await refreshRecent();
      renderHint();

      if(!fromCourseTap){
        setStatus(true, '送信しました');
        setTimeout(()=>setStatus(true,'接続OK'), 900);
      }
    }catch(err){
      alert('送信に失敗しました：' + err.message);
      setStatus(false, '接続NG');
    }
  }

  function tagForResult(r){
    if(r==='SUCCESS') return {cls:'ok', text:'成功'};
    return {cls:'sv', text:'セーブ'};
  }

  async function refreshRecent(){
    try{
      const data = await api({ action:'getRecentShots', limit: 20 });
      const list = qs('shotsList');
      list.innerHTML = '';

      data.shots.forEach(s => {
        const item = document.createElement('div');
        item.className = 'item';

        const left = document.createElement('div');
        const t = tagForResult(s.result);
        left.innerHTML = `
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <span class="tag ${t.cls}">${t.text}</span>
            <span class="tag">コース ${s.course}</span>
            <span class="tag">立 ${s.goalieStand}</span>
            <span class="tag">エリア ${s.shooterArea}</span>
          </div>
          <div class="tiny muted" style="margin-top:6px;">
            ${escapeHtml(s.goalieName)} ${s.staff ? ' / ' + escapeHtml(s.staff) : ''}
          </div>
        `;

        const right = document.createElement('button');
        right.className = 'btn btnSmall';
        right.textContent = '取り消し';
        right.onclick = async () => {
          if(!confirm('この1件を取り消しますか？')) return;
          try{
            await api({ action:'undoShot', shotId: s.id, deletedBy: (qs('staff').value||'').trim() });
            await refreshRecent();
          }catch(err){
            alert('取り消し失敗：' + err.message);
          }
        };

        item.appendChild(left);
        item.appendChild(right);
        list.appendChild(item);
      });

    }catch(err){
      setStatus(false, '履歴取得NG');
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[s]));
  }

  // Players UI
  async function openPlayers(){
    qs('playersCard').style.display = '';
    await refreshPlayers();
  }
  function closePlayers(){ qs('playersCard').style.display = 'none'; }

  async function refreshPlayers(){
    const data = await api({ action:'getPlayers' });
    const list = qs('playersList');
    list.innerHTML = '';
    data.players.forEach(p => {
      const row = document.createElement('div');
      row.className = 'item';
      const left = document.createElement('div');
      left.innerHTML = `
        <div style="font-weight:900">${escapeHtml(p.name)}</div>
        <div class="tiny muted">ID: ${escapeHtml(p.playerId)}</div>
      `;

      const right = document.createElement('div');
      right.style.display='flex'; right.style.gap='8px';

      const toggle = document.createElement('button');
      toggle.className = 'btn btnSmall';
      toggle.textContent = p.isActive ? '表示中' : '非表示';
      toggle.style.background = p.isActive ? 'rgba(34,197,94,.10)' : 'rgba(255,255,255,.05)';
      toggle.onclick = async () => {
        await api({ action:'setPlayerActive', playerId: p.playerId, isActive: !p.isActive });
        await refreshPlayers(); await loadPlayers();
      };

      const del = document.createElement('button');
      del.className = 'btn btnSmall';
      del.textContent = '削除';
      del.onclick = async () => {
        if(!confirm(`「${p.name}」を削除しますか？`)) return;
        await api({ action:'deletePlayer', playerId: p.playerId });
        await refreshPlayers(); await loadPlayers();
      };

      right.appendChild(toggle);
      right.appendChild(del);

      row.appendChild(left);
      row.appendChild(right);
      list.appendChild(row);
    });
  }

  async function addPlayer(){
    const name = qs('newPlayerName').value.trim();
    if(!name){ alert('名前を入力してください'); return; }
    await api({ action:'addPlayer', name });
    qs('newPlayerName').value = '';
    await refreshPlayers(); await loadPlayers();
  }

  async function loadPlayers(){
    const data = await api({ action:'getPlayers' });
    const active = data.players.filter(p => p.isActive);

    const sel = qs('goalieSelect');
    sel.innerHTML = '';
    const opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = '選択してください';
    sel.appendChild(opt0);

    active.forEach(p => {
      const o = document.createElement('option');
      o.value = p.playerId;
      o.textContent = p.name;
      sel.appendChild(o);
    });

    if(state.goalieId){ sel.value = state.goalieId; }

    sel.onchange = () => {
      const g = getSelectedGoalie();
      state.goalieId = g.goalieId;
      state.goalieName = g.goalieName;
      renderHint();
    };
  }

  async function boot(){
    buildCourseButtons();
    renderHint();

    try{ await api({ action:'ping' }); setStatus(true,'接続OK'); }
    catch(e){ setStatus(false,'接続NG'); }

    await loadPlayers();
    await refreshRecent();
  }

  boot();
</script>
</body>
</html>
