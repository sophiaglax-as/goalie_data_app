<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Goalie Data | 入力</title>
  <style>
    :root{
      --navy:#0b1b3a;
      --white:#fff;
      --muted:rgba(255,255,255,.75);
      --line:rgba(255,255,255,.16);
      --card:rgba(255,255,255,.08);
      --btn:#ffd400;
      --btnText:#0b1b3a;
      --danger:#ff4d4f;
      --ok:#34c759;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI",Roboto,Arial,sans-serif;
      background:var(--navy);
      color:var(--white);
      padding:12px 12px 24px;
    }
    .app{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
    .header{
      position:sticky;top:0;z-index:5;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(11,27,58,.92), rgba(11,27,58,.70));
      padding:10px 0 6px;
    }
    h1{font-size:18px;margin:0 0 6px}
    .sub{font-size:12px;color:var(--muted);margin:0}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    label{font-size:12px;color:var(--muted)}
    select,input,textarea{
      width:100%;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      color:var(--white);
      border-radius:14px;
      padding:12px 12px;
      font-size:16px;
      outline:none;
    }
    textarea{min-height:72px;resize:vertical}
    .row{display:flex;gap:10px;align-items:center}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{
      width:100%;
      background:var(--btn);
      color:var(--btnText);
      border:none;border-radius:16px;
      padding:14px 14px;
      font-weight:900;font-size:16px;
      cursor:pointer;
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .pill{
      display:inline-flex;gap:8px;align-items:center;
      padding:8px 10px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      font-size:12px;color:var(--muted);
    }
    .warn{color:#ffb3b3;font-size:12px;line-height:1.5}
    .ok{color:#b7ffca;font-size:12px;line-height:1.5}
    .hidden{display:none !important}

    /* Result buttons */
    .seg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .seg button{
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--white);
      padding:14px 10px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }
    .seg button.active{
      background:rgba(255,212,0,.25);
      border-color:rgba(255,212,0,.5);
    }

    /* Course 3×3 */
    .board{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:10px;
    }
    .cellBtn{
      aspect-ratio:1/1;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--white);
      font-size:18px;
      font-weight:900;
      cursor:pointer;
    }
    .cellBtn:active{transform:scale(.98)}

    /* Shooter Area 3×2 (5-3-1 / 6-4-2) */
    .areaGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:10px;
    }
    .areaBtn{
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--white);
      padding:14px 10px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }
    .areaBtn.active{
      background:rgba(255,212,0,.25);
      border-color:rgba(255,212,0,.5);
    }

    /* Goalie Position (Left/Center/Right) */
    .posGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:10px;
    }
    .posBtn{
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--white);
      padding:14px 10px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }
    .posBtn.active{
      background:rgba(255,212,0,.25);
      border-color:rgba(255,212,0,.5);
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>ゴーリーデータ｜入力</h1>
      <p class="sub">メニュー → セッション → ゴーリー → シューターエリア → 結果 → コース9 → 送信</p>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div class="pill" id="statusPill">● 読み込み中…</div>
        <div class="pill" id="envPill">API</div>
      </div>
      <div id="msg" class="warn" style="margin-top:8px;display:none"></div>
      <div id="msgOk" class="ok" style="margin-top:8px;display:none"></div>
    </div>

    <!-- ① Menu + Session -->
    <div class="card">
      <label>① メニュー選択</label>
      <select id="menuSelect"></select>

      <div class="grid2" style="margin-top:10px">
        <div>
          <label>日付</label>
          <input type="date" id="sessionDate" />
        </div>
        <div>
          <label>タイトル（任意）</label>
          <input type="text" id="sessionTitle" placeholder="例：午前練 / 6on6前 など" />
        </div>
      </div>

      <div style="margin-top:10px">
        <label>メモ（任意）</label>
        <textarea id="sessionNote" placeholder="補足"></textarea>
      </div>

      <button class="btn" id="createSessionBtn" style="margin-top:10px">セッション作成（この条件で入力開始）</button>

      <div style="margin-top:10px">
        <div class="pill" id="sessionPill">session：未作成</div>
        <div class="pill" id="menuPill" style="margin-left:8px">menu：未選択</div>
      </div>

      <div class="warn" style="margin-top:8px">
        ※この版は <b>shots に menuId / shooterArea を必ず保存</b>します（後で集計が壊れない）。
      </div>
    </div>

    <!-- ② Goalie -->
    <div class="card">
      <label>② ゴーリー選択</label>
      <select id="goalieSelect"></select>
    </div>

    <!-- ③ Goalie Position -->
     <div class="card">
      <label>③ ゴーリー位置（左・中央・右）</label>
      <div class="posGrid" id="posGrid"></div>
    </div>

    <!-- ③ Shooter Area (復活) -->
    <div class="card">
      <label>③ シューターエリア（1〜6）</label>
      <div class="areaGrid" id="areaGrid"></div>
      <div class="warn" style="margin-top:8px">並び：上段 5-3-1 / 下段 6-4-2</div>
    </div>

    <!-- ④ Result -->
    <div class="card">
      <label>④ 結果</label>
      <div class="seg">
        <button id="btnSave" type="button">セーブ</button>
        <button id="btnGoal" type="button">成功</button>
      </div>
      <div class="warn" style="margin-top:8px">※「枠外」は今回は記録しない前提（成功/セーブのみ）。</div>
    </div>

    <!-- ⑤ Course 3×3 -->
    <div class="card">
      <label>⑤ コース（枠内 3×3 / 1〜9）</label>
      <div class="board" id="board"></div>
      <div class="warn" style="margin-top:8px">左上=1 … 右下=9</div>
    </div>

    <button class="btn" id="sendBtn" type="button">送信</button>
    <button id="btnUndoLast" type="button">直前取り消し</button>
  </div>

  <div class="card">
    <label>検索して取り消し（期間 / ゴーリー / メニュー）</label>
  
    <div class="row" style="margin-top:10px">
      <input id="fStart" type="date">
      <input id="fEnd" type="date">
    </div>
  
    <div class="row" style="margin-top:10px">
      <select id="fGoalie"></select>
      <select id="fMenu"></select>
    </div>
  
    <div class="row" style="margin-top:10px">
      <button class="btn" id="btnSearch" type="button">検索</button>
    </div>
  
    <div id="shotList" style="margin-top:10px"></div>
  </div>

  <script>
    // ====== 設定：GAS WebアプリURL（/exec）を貼る ======
    const SERVICE_URL = "https://script.google.com/macros/s/AKfycbyhEXJZTq49JNANcxxgxO2kuvEqW31lLt6MY-ewzCy_W3vSMUXYHySRfikOaCzoXXXnSg/exec";

    const $ = (id)=>document.getElementById(id);

    // ✅ A：state に shooterArea を追加
    const state = {
      sessionId: "",
      menuId: "",
      goalieId: "",
      goaliePos: "",   // ★追加
      shooterArea: 0, // ★追加
      result: "",     // "save" | "goal"
      course9: 0
    };

    function setStatus(t){ $("statusPill").textContent = "● " + t; }
    function showMsg(text){
      $("msgOk").style.display = "none";
      $("msgOk").textContent = "";
      $("msg").style.display = "block";
      $("msg").textContent = text;
    }
    function showNg(text){ showMsg(text); 
    }
    function showOk(text){
      $("msg").style.display = "none";
      $("msg").textContent = "";
      $("msgOk").style.display = "block";
      $("msgOk").textContent = text;
    }
    function clearMsg(){
      $("msg").style.display = "none";
      $("msg").textContent = "";
      $("msgOk").style.display = "none";
      $("msgOk").textContent = "";
    }

    async function apiGet(params){
      const url = new URL(SERVICE_URL);
      Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString(), { method:"GET" });
      const text = await res.text();
      let json;
      try{ json = JSON.parse(text); }
      catch(e){ throw new Error("JSON parse failed: " + text.slice(0,140)); }
      if(!json.ok) throw new Error(json.error || "API error");
      return json;
    }

    async function apiGetJSON(params){
  const url = new URL(SERVICE_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method:"GET" });
  const text = await res.text();
  let json;
  try{ json = JSON.parse(text); }
  catch(e){ throw new Error("JSON parse failed: " + text.slice(0,140)); }
  if(!json.ok) throw new Error(json.error || "API error");
  return json;
}

    async function apiPost(payload){
      const res = await fetch(SERVICE_URL, {
        method:"POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });
      const text = await res.text();
      let json;
      try{ json = JSON.parse(text); }
      catch(e){ throw new Error("JSON parse failed: " + text.slice(0,140)); }
      if(!json.ok) throw new Error(json.error || "API error");
      return json;
    }

    function isoNow(){ return new Date().toISOString(); }

    function setActiveResult(val){
      state.result = val;
      $("btnSave").classList.toggle("active", val === "save");
      $("btnGoal").classList.toggle("active", val === "goal");
    }

    function buildBoard(){
      const b = $("board");
      b.innerHTML = "";
      for(let i=1;i<=9;i++){
        const btn = document.createElement("button");
        btn.className = "cellBtn";
        btn.type = "button";
        btn.textContent = i;
        btn.addEventListener("click", ()=>{
          state.course9 = i;
          showOk("コース選択：#" + i + "（送信で確定）");
        });
        b.appendChild(btn);
      }
    }

    // ✅ D：シューターエリア生成（指定並び）
    function buildShooterArea(){
      const order = [5,3,1, 6,4,2]; // ★指定並び
      const g = $("areaGrid");
      g.innerHTML = "";

      order.forEach(n=>{
        const b = document.createElement("button");
        b.type = "button";
        b.className = "areaBtn";
        b.textContent = n;

        b.addEventListener("click", ()=>{
          state.shooterArea = n;

          // active付け替え
          [...g.querySelectorAll(".areaBtn")].forEach(x=>x.classList.remove("active"));
          b.classList.add("active");

          showOk("シューターエリア：#" + n);
        });

        g.appendChild(b);
      });
    }

    function buildGoaliePos(){
  const order = [
    { v:"L", label:"左" },
    { v:"C", label:"中央" },
    { v:"R", label:"右" },
  ];
  const g = $("posGrid");
  g.innerHTML = "";

  order.forEach(({v,label})=>{
    const b = document.createElement("button");
    b.type = "button";
    b.className = "posBtn";
    b.textContent = label;

    b.addEventListener("click", ()=>{
      state.goaliePos = v;

      [...g.querySelectorAll(".posBtn")].forEach(x=>x.classList.remove("active"));
      b.classList.add("active");

      showOk("ゴーリー位置：" + label);
    });

    g.appendChild(b);
  });
}

    function syncPills(){
      $("sessionPill").textContent = state.sessionId ? `session：${state.sessionId.slice(0,8)}…` : "session：未作成";
      $("menuPill").textContent = state.menuId ? `menu：${state.menuId}` : "menu：未選択";
    }

    function todayYmd(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }

    async function undoLast(){
  try{
    if(!state.sessionId) throw new Error("sessionIdが未設定です");

    const res = await apiGetJSON({ action:"getRecentShots", sessionId: state.sessionId, limit: 1 });
    const shot = (res.shots || [])[0];
    if(!shot) { showMsg("取り消せるデータがありません"); return; }

    await apiGetJSON({ action:"deleteShot", shotId: shot.shotId, deletedBy: "web" });
    showOk(`直前取り消しOK（${shot.shotId.slice(0,8)}…）`);
  }catch(e){
    showMsg(String(e.message || e));
  }
}

    async function init(){
      clearMsg();

      buildBoard();
      buildShooterArea(); // ✅ 追加
      buildBoard();
      buildGoaliePos();   // ★追加
      buildShooterArea();

      if(!SERVICE_URL || SERVICE_URL.includes("PASTE_")){
        $("envPill").textContent = "⚠️ SERVICE_URL未設定";
        setStatus("準備OK（URL未設定）");
        $("sessionDate").value = todayYmd();
        syncPills();
        return;
      }

      $("envPill").textContent = "✅ 接続先OK";
      setStatus("マスタ読込…");

      await apiGet({ action:"ping" });

      const [menus, goalies] = await Promise.all([
        apiGet({ action:"getMenus" }),
        apiGet({ action:"getGoalies" }),
      ]);

      // menus
      const ms = $("menuSelect");
      ms.innerHTML = `<option value="">メニューを選択</option>`;
      (menus.menus || []).forEach(m=>{
        const opt = document.createElement("option");
        opt.value = m.menuId;
        opt.textContent = `${m.menuName}${m.groupType ? `（${m.groupType}）` : ""}`;
        ms.appendChild(opt);
      });

      ms.addEventListener("change", ()=>{
        state.menuId = ms.value;
        syncPills();
      });

      // goalies
      const gs = $("goalieSelect");
      gs.innerHTML = `<option value="">ゴーリーを選択</option>`;
      (goalies.goalies || []).forEach(g=>{
        const opt = document.createElement("option");
        opt.value = g.goalieId;
        opt.textContent = g.name;
        gs.appendChild(opt);
      });

      gs.addEventListener("change", ()=>{
        state.goalieId = gs.value;
      });

      const fg = $("fGoalie");
      fg.innerHTML = `<option value="">（全ゴーリー）</option>`;
      (goalies.goalies || []).forEach(g=>{
        const opt = document.createElement("option");
        opt.value = g.goalieId;
        opt.textContent = g.name;
        fg.appendChild(opt);
      });

      const fm = $("fMenu");
      fm.innerHTML = `<option value="">（全メニュー）</option>`;
      (menus.menus || []).forEach(m=>{
        const opt = document.createElement("option");
        opt.value = m.menuId;
        opt.textContent = `${m.menuName}${m.groupType ? `（${m.groupType}）` : ""}`;
        fm.appendChild(opt);
      });

      // default date
      $("sessionDate").value = todayYmd();

      // result buttons
      $("btnSave").addEventListener("click", ()=>setActiveResult("save"));
      $("btnGoal").addEventListener("click", ()=>setActiveResult("goal"));
      setActiveResult("save");

      // create session
      $("createSessionBtn").addEventListener("click", async ()=>{
        clearMsg();
        try{
          if(!state.menuId) throw new Error("メニューを選択してください");
          const date = $("sessionDate").value;
          if(!date) throw new Error("日付を入力してください");

          setStatus("セッション作成中…");
          $("createSessionBtn").disabled = true;

          const json = await apiGetJSON({
            action: "createSession",
            date,
            title: $("sessionTitle").value || "",
            menuId: state.menuId,
            note: $("sessionNote").value || ""
          });

          state.sessionId = json.sessionId;
          syncPills();
          showOk("セッション作成OK。入力を開始できます。");
          setStatus("準備OK");
        }catch(e){
          showMsg(e.message || String(e));
          setStatus("エラー");
        }finally{
          $("createSessionBtn").disabled = false;
        }
      });

      // send
      $("sendBtn").addEventListener("click", async ()=>{
        clearMsg();
        try{
          if(!state.sessionId) throw new Error("先にセッションを作成してください");
          if(!state.menuId) throw new Error("メニューが未選択です（menuIdが必要）");
          if(!state.goalieId) throw new Error("ゴーリーを選択してください");

          // ✅ E：シューターエリア必須チェック
          if(!(state.shooterArea >= 1 && state.shooterArea <= 6)) {
            throw new Error("シューターエリア（1〜6）を選択してください");
          }

          if(!(state.result === "save" || state.result === "goal")) throw new Error("結果を選択してください");
          if(!(state.course9 >= 1 && state.course9 <= 9)) throw new Error("コース（1〜9）を選択してください");

          setStatus("送信中…");
          $("sendBtn").disabled = true;

          const payload = {
            action: "addShot",
            timestamp: isoNow(),
            sessionId: state.sessionId,
            menuId: state.menuId,             // ★shots.menuId に入る
            goalieId: state.goalieId,
            goaliePos: state.goaliePos,  
            shooterArea: state.shooterArea,   // ★追加（shots.shooterArea に入る）
            result: state.result,
            course9: state.course9,
            isInFrame: true,
            inGoal: (state.result === "goal"),
            note: ""
          };

           const json= await apiGetJSON(payload);
          showOk(`送信OK（shotId: ${json.shotId.slice(0,8)}…）`);

          // 次の入力へ：コースだけリセット（必要ならresultもリセットOK）
          state.course9 = 0;
          setStatus("準備OK");
        }catch(e){
          showMsg(e.message || String(e));
          setStatus("エラー");
        }finally{
          $("sendBtn").disabled = false;
        }
      });

      syncPills();
      setStatus("準備OK");
    }

    $("btnSearch").addEventListener("click", searchShots);

async function searchShots(){
  clearMsg();
  try{
    const res = await apiGetJSON({
      action: "getShots",
      startDate: $("fStart").value || "",
      endDate: $("fEnd").value || "",
      goalieId: $("fGoalie").value || "",
      menuId: $("fMenu").value || "",
      // 事故防止で「今のセッションだけ」にしたいなら下をON
      // sessionId: state.sessionId,
      limit: 300
    });
    renderShotList(res.shots || []);
    showOk(`検索OK：${(res.shots||[]).length}件`);
  }catch(e){
    showMsg(String(e.message || e));
  }
}

function renderShotList(shots){
  const box = $("shotList");
  if(!shots.length){
    box.innerHTML = `<div class="warn">該当データなし</div>`;
    return;
  }

  box.innerHTML = shots.map(s=>{
    const t = new Date(s.timestamp);
    const tText = isFinite(t.getTime()) ? t.toLocaleString("ja-JP") : s.timestamp;

    return `
      <div class="card" style="padding:10px;margin-top:8px">
        <div style="font-weight:900">${escapeHtml(tText)}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:4px">
          menu:${escapeHtml(s.menuId)} / goalie:${escapeHtml(s.goalieId)}(${escapeHtml(s.goaliePos)})
          / ${escapeHtml(s.result)} / course:${s.course9} / area:${s.shooterArea}
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn" type="button" onclick="deleteShotUI('${s.shotId}')">この1件を取り消し</button>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:6px">
          shotId: ${escapeHtml(s.shotId)}
        </div>
      </div>
    `;
  }).join("");
}

window.deleteShotUI = async (shotId)=>{
  clearMsg();
  try{
    await apiGetJSON({ action:"deleteShot", shotId, deletedBy:"web" });
    showOk("取り消ししました");
    searchShots(); // 一覧更新
  }catch(e){
    showMsg(String(e.message || e));
  }
};

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
    
    $("btnUndoLast").addEventListener("click", undoLast);

    init().catch(e=>{
      showMsg(e.message || String(e));
      setStatus("エラー");
    });
  </script>
</body>
</html>
